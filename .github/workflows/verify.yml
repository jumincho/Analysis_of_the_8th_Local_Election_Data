name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  structure:
    name: Structure & R Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: Shapefile bundle integrity
        run: |
          missing=0
          for ext in shp shx dbf prj; do
            if [ ! -f "data/shapefiles/ctp_rvn.${ext}" ]; then
              echo "::error::Missing shapefile component: data/shapefiles/ctp_rvn.${ext}"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: R parse all src/ scripts
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Run R syntax check
        shell: Rscript {0}
        run: |
          fail <- 0
          for (f in list.files("src", pattern = "\\.R$", full.names = TRUE)) {
            res <- tryCatch(parse(file = f), error = function(e) {
              cat(sprintf("::error file=%s::%s\n", f, conditionMessage(e)))
              fail <<- fail + 1
              NULL
            })
            if (!is.null(res)) cat(sprintf("ok: %s\n", f))
          }
          if (fail > 0) quit(status = 1)

      - name: Required CSV files present
        run: |
          missing=0
          for f in \
            "data/07_local_vote_share.csv" \
            "data/07_local_other_vote_share.csv" \
            "data/08_local_vote_share.csv" \
            "data/08_local_other_vote_share.csv" \
            "data/08_local_male_age_vote_share.csv" \
            "data/08_local_female_age_vote_share.csv" \
            "data/20th_presidential_vote_share.csv"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing CSV: $f"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: README internal links resolve
        run: |
          missing=0
          for link in $(grep -oE '\]\([^)]+\)' README.md | sed 's|](||; s|)$||' | grep -v '^http' | grep -v '^#' | sort -u); do
            path="${link%%#*}"
            [ -z "$path" ] && continue
            if [ ! -e "$path" ]; then
              echo "::warning::README links to missing path: $link"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing README link(s) point to non-existent paths"
          fi
